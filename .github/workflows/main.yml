name: Deploy to Rondera Burundi

on:
  push:
    branches: [ main ]    # Triggers on push to main branch
  workflow_dispatch:       # Allows manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: FTP Deploy
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ftpupload.net
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        # Default for InfinityFree primary domain. 
        # If using an addon domain, change to: /yourdomain.com/htdocs/
        server-dir: /htdocs/
        protocol: ftp
        port: 21
        local-dir: ./
        timeout: 600000
        exclude: |
          **/.git*
          **/.git*/**
          **/scratch/**
          **/README.md
          **/*.sql
          .github/**
          setup_database.php
